<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="200" viewBox="0 0 920 200" role="img" aria-labelledby="title desc">
  <title id="title">NexoSign</title>
  <desc id="desc">Marca NexoSign: firma PDF local, acento cyan</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Fondo -->
  <rect x="0" y="0" width="920" height="200" rx="16" fill="url(#bg)" stroke="#334155" stroke-width="2"/>
  <!-- Decoracion suave (sin filtros: compatibilidad preview) -->
  <circle cx="780" cy="50" r="70" fill="#0891b2" opacity="0.15"/>
  <circle cx="860" cy="170" r="55" fill="#06b6d4" opacity="0.12"/>
  <!-- Icono: doc + tilde firma -->
  <rect x="56" y="56" width="88" height="108" rx="10" fill="#1e293b" stroke="url(#accent)" stroke-width="4"/>
  <path d="M72 88 L128 88 M72 108 L120 108 M72 128 L128 128" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  <path d="M88 152 L108 168 L132 136" fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Texto (system-ui suele existir en previews) -->
  <text x="180" y="112" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="44" font-weight="700" fill="#f1f5f9">NexoSign</text>
  <text x="180" y="154" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="400" fill="#cbd5e1">Firma PDF en local | PAdES | PKCS#11 | API loopback</text>
</svg>
